apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: default
spec:
  interval: 10m
  chart:
    spec:
      chart: traefik
      version: '4.0.x'
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
      interval: 10m
      valuesFiles:
        - values.yaml
  values:
    replicaCount: 1
