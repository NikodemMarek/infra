apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: grafana-community
  namespace: monitoring
spec:
  interval: 1h
  # OSS Loki chart moved here from grafana/helm-charts in early 2026.
  url: https://grafana-community.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: monitoring
spec:
  # ServiceMonitor CRD comes from kube-prometheus-stack, so wait for it.
  dependsOn:
    - name: kube-prometheus-stack
  chart:
    spec:
      chart: loki
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: grafana-community
      version: 17.3.1
  interval: 1h
  values:
    # Single-binary, filesystem-backed — right scale for one homelab cluster.
    deploymentMode: SingleBinary
    loki:
      auth_enabled: false
      commonConfig:
        replication_factor: 1
      storage:
        type: filesystem
      schemaConfig:
        configs:
          - from: "2024-04-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: loki_index_
              period: 24h
      limits_config:
        retention_period: 336h # 14d
      compactor:
        retention_enabled: true
        delete_request_store: filesystem
    singleBinary:
      replicas: 1
      persistence:
        enabled: true
        storageClass: longhorn
        size: 10Gi
      resources:
        requests:
          memory: "128Mi"
          cpu: "50m"
        limits:
          memory: "512Mi"
          cpu: "500m"
    # Disable the scalable/distributed components and the memcached tiers.
    read:
      replicas: 0
    write:
      replicas: 0
    backend:
      replicas: 0
    chunksCache:
      enabled: false
    resultsCache:
      enabled: false
    # nginx gateway in front of the single binary -> Service "loki-gateway".
    gateway:
      enabled: true
    # No self-monitoring substack / canary / helm test; just expose a ServiceMonitor.
    lokiCanary:
      enabled: false
    test:
      enabled: false
    monitoring:
      serviceMonitor:
        enabled: true
      dashboards:
        enabled: false
      rules:
        enabled: false
