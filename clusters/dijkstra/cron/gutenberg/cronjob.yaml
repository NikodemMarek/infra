apiVersion: batch/v1
kind: CronJob
metadata:
  name: gutenberg-sync
  namespace: cron
spec:
  schedule: "0 5 * * 1"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          volumes:
            - name: books
              persistentVolumeClaim:
                claimName: gutenberg-books-pvc
            - name: scripts
              configMap:
                name: gutenberg-scripts
                defaultMode: 0755
          containers:
            - name: gutenberg
              image: alpine:3.20
              command: ["/bin/sh", "-c"]
              args:
                - set -e; apk add --no-cache rsync bash coreutils findutils exiftool && /scripts/sync.sh && /scripts/symlink.sh
              volumeMounts:
                - name: books
                  mountPath: /data
                - name: scripts
                  mountPath: /scripts
              resources:
                requests:
                  memory: 128Mi
                  cpu: 100m
                limits:
                  memory: 512Mi
                  cpu: 1000m
