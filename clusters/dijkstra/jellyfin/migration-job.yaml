apiVersion: batch/v1
kind: Job
metadata:
  name: jellyfin-migration
  namespace: jellyfin
spec:
  ttlSecondsAfterFinished: 604800
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      volumes:
        - name: src
          persistentVolumeClaim:
            claimName: jellyfin-data-pvc
        - name: data
          persistentVolumeClaim:
            claimName: jellyfin-data
        - name: config
          persistentVolumeClaim:
            claimName: jellyfin-config
        - name: cache
          persistentVolumeClaim:
            claimName: jellyfin-cache
      containers:
        - name: migrate
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eux
              cp -a /src/data/.   /dst/data/
              cp -a /src/config/. /dst/config/
              if [ -d /src/cache ] && [ -n "$(ls -A /src/cache 2>/dev/null)" ]; then
                cp -a /src/cache/. /dst/cache/
              fi
              chown -R 1000:1000 /dst/data /dst/config /dst/cache
              echo "migration complete"
          volumeMounts:
            - name: src
              mountPath: /src
              readOnly: true
            - name: data
              mountPath: /dst/data
            - name: config
              mountPath: /dst/config
            - name: cache
              mountPath: /dst/cache
