apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: jellyfin
  labels:
    app: jellyfin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jellyfin
  template:
    metadata:
      labels:
        app: jellyfin
    spec:
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: jellyfin-data-pvc
        - name: movies
          persistentVolumeClaim:
            claimName: jellyfin-movies-pvc
        - name: shows
          persistentVolumeClaim:
            claimName: jellyfin-shows-pvc
      containers:
        - name: jellyfin
          image: jellyfin/jellyfin:latest
          ports:
            - containerPort: 8096
          env:
            - name: JELLYFIN_DATA_DIR
              value: "/data/data"
            - name: JELLYFIN_CONFIG_DIR
              value: "/data/config"
            - name: JELLYFIN_CACHE_DIR
              value: "/data/cache"
          volumeMounts:
            - name: data
              mountPath: /data
            - name: movies
              mountPath: /movies
              readOnly: true
            - name: shows
              mountPath: /shows
              readOnly: true
          resources:
            requests:
              memory: "512Mi"
              cpu: "100m"
            limits:
              memory: "1536Mi"
              cpu: "4000m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seerr
  namespace: jellyfin
  labels:
    app: seerr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seerr
  template:
    metadata:
      labels:
        app: seerr
    spec:
      containers:
        - name: seerr
          image: seerr/seerr:latest
          ports:
            - containerPort: 5055
          volumeMounts:
            - name: data
              mountPath: /app/config
          resources:
            requests:
              memory: "64Mi"
              cpu: "20m"
            limits:
              memory: "256Mi"
              cpu: "500m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: seerr-data-pvc
