apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: traefik
  namespace: default
spec:
  interval: 1m
  url: https://helm.traefik.io/traefik
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: default
spec:
  chart:
    spec:
      chart: traefik
      sourceRef:
        kind: HelmRepository
        name: traefik
      version: 38.0.1
  interval: 1m
  values:
    resources:
      requests:
        memory: "64Mi"
        cpu: "20m"
      limits:
        memory: "256Mi"
        cpu: "500m"
    ports:
      web:
        port: 80
        nodePort: 30000
    ingressClass:
      enabled: false
    providers:
      kubernetesIngress:
        enabled: false
      kubernetesGateway:
        enabled: true
    gateway:
      listeners:
        web:
          port: 80
          protocol: HTTP
          namespacePolicy:
            from: All
    metrics:
      prometheus:
        # Per-router metrics in addition to the default entrypoint/service labels.
        addRoutersLabels: true
        # Dedicated metrics service + ServiceMonitor for Prometheus to scrape.
        service:
          enabled: true
        serviceMonitor:
          enabled: true
    logs:
      general:
        level: INFO
      access:
        enabled: true
    additionalArguments:
      - "--entrypoints.web.http.encodedcharacters.allowencodedslash=true"
      - "--entrypoints.web.http.encodedcharacters.allowencodedquestionmark=true"
