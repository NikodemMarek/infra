apiVersion: v1
kind: Service
metadata:
  name: prowlarr
  namespace: arrstack
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/hostname: "prowlarr"
    tailscale.com/proxy-class: "triss-pinned"
spec:
  selector:
    app: prowlarr
  ports:
    - name: webui
      protocol: TCP
      port: 80
      targetPort: 9696
