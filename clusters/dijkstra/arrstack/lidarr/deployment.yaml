apiVersion: apps/v1
kind: Deployment
metadata:
  name: lidarr
  namespace: arrstack
  labels:
    app: lidarr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: lidarr
  template:
    metadata:
      labels:
        app: lidarr
    spec:
      nodeSelector:
        kubernetes.io/hostname: triss
      containers:
        - name: lidarr
          image: linuxserver/lidarr:latest
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
          ports:
            - name: webui
              containerPort: 8686
          volumeMounts:
            - name: config
              mountPath: /config
              subPath: lidarr
            - name: downloads
              mountPath: /downloads
            - name: music
              mountPath: /music
          resources:
            requests:
              cpu: "50m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: arrstack-config-pvc
        - name: downloads
          persistentVolumeClaim:
            claimName: arrstack-downloads-pvc
        - name: music
          persistentVolumeClaim:
            claimName: arrstack-music-pvc
