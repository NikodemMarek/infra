apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: owncloud-data-pvc
  namespace: owncloud
  labels:
    recurring-job-group.longhorn.io/default: "enabled"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: owncloud-files-pvc
  namespace: owncloud
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs
  resources:
    requests:
      storage: 200Gi
  volumeName: owncloud-files-pv
