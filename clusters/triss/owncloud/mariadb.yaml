apiVersion: apps/v1
kind: Deployment
metadata:
  name: mariadb
  namespace: owncloud
  labels:
    app: mariadb
spec:
  replicas: 0
  selector:
    matchLabels:
      app: mariadb
  template:
    metadata:
      labels:
        app: mariadb
    spec:
      containers:
        - name: mariadb
          image: mariadb:latest
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "owncloud"
            - name: MYSQL_USER
              value: "owncloud"
            - name: MYSQL_PASSWORD
              value: "owncloud"
            - name: MYSQL_DATABASE
              value: "owncloud"
            - name: MARIADB_AUTO_UPGRADE
              value: "1"
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: owncloud-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mariadb
  namespace: owncloud
spec:
  selector:
    app: mariadb
  ports:
    - name: mariadb
      protocol: TCP
      port: 3306
      targetPort: 3306
