apiVersion: v1
kind: Service
metadata:
  name: owncloud
  namespace: owncloud
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/hostname: "cloud"
spec:
  selector:
    app: owncloud
  ports:
    - name: owncloud
      protocol: TCP
      port: 80
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: mariadb
  namespace: owncloud
spec:
  selector:
    app: mariadb
  ports:
    - name: mariadb
      protocol: TCP
      port: 3306
      targetPort: 3306
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: owncloud
spec:
  selector:
    app: redis
  ports:
    - name: redis
      protocol: TCP
      port: 6379
      targetPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: collabora
  namespace: owncloud
spec:
  selector:
    app: collabora
  ports:
    - name: collabora
      protocol: TCP
      port: 80
      targetPort: 9980
