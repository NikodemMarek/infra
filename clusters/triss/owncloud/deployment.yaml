apiVersion: apps/v1
kind: Deployment
metadata:
  name: owncloud
  namespace: owncloud
  labels:
    app: owncloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: owncloud
  template:
    metadata:
      labels:
        app: owncloud
    spec:
      containers:
        - name: owncloud
          image: owncloud/server:10.16.1
          ports:
            - containerPort: 8080
          env:
            - name: OWNCLOUD_DOMAIN
              value: "cloud.nkmrk.com"
            - name: OWNCLOUD_TRUSTED_DOMAINS
              value: "cloud.nkmrk.com"
            - name: OWNCLOUD_DB_TYPE
              value: "mysql"
            - name: OWNCLOUD_DB_NAME
              value: "owncloud"
            - name: OWNCLOUD_DB_USERNAME
              value: "owncloud"
            - name: OWNCLOUD_DB_PASSWORD
              value: "owncloud"
            - name: OWNCLOUD_DB_HOST
              value: "mariadb"
            - name: OWNCLOUD_ADMIN_USERNAME
              value: "admin"
            - name: OWNCLOUD_ADMIN_PASSWORD
              value: "admin"
            - name: OWNCLOUD_MYSQL_UTF8MB4
              value: "true"
            - name: OWNCLOUD_REDIS_ENABLED
              value: "true"
            - name: OWNCLOUD_REDIS_HOST
              value: "redis"
          volumeMounts:
            - name: files
              mountPath: /mnt/data
          resources:
            requests:
              memory: "128Mi"
              cpu: "20m"
            limits:
              memory: "384Mi"
              cpu: "500m"
      volumes:
        - name: files
          persistentVolumeClaim:
            claimName: files-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mariadb
  namespace: owncloud
  labels:
    app: mariadb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mariadb
  template:
    metadata:
      labels:
        app: mariadb
    spec:
      containers:
        - name: mariadb
          image: mariadb:latest
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "owncloud"
            - name: MYSQL_USER
              value: "owncloud"
            - name: MYSQL_PASSWORD
              value: "owncloud"
            - name: MYSQL_DATABASE
              value: "owncloud"
            - name: MARIADB_AUTO_UPGRADE
              value: "1"
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
          resources:
            requests:
              memory: "128Mi"
              cpu: "20m"
            limits:
              memory: "384Mi"
              cpu: "500m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: owncloud-data-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: owncloud
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:latest
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "16Mi"
              cpu: "5m"
            limits:
              memory: "64Mi"
              cpu: "200m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: collabora
  namespace: owncloud
  labels:
    app: collabora
spec:
  replicas: 1
  selector:
    matchLabels:
      app: collabora
  template:
    metadata:
      labels:
        app: collabora
    spec:
      containers:
        - name: collabora
          image: collabora/code:latest
          ports:
            - containerPort: 9980
          env:
            - name: domain
              value: "cloud\\.nkmrk\\.com"
            - name: server_name
              value: "collabora.nkmrk.com"
            - name: extra_params
              value: "--o:ssl.enable=false --o:ssl.termination=true"
            - name: DONT_GEN_SSL_CERT
              value: "1"
          securityContext:
            capabilities:
              add: ["CAP_SYS_ADMIN", "CAP_NET_BIND_SERVICE"]
            allowPrivilegeEscalation: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "20m"
            limits:
              memory: "1Gi"
              cpu: "500m"
