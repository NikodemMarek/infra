apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: movies-pvc
  namespace: jellyfin
spec:
  accessModes:
    - ReadOnlyMany
  storageClassName: nfs
  resources:
    requests:
      storage: 200Gi
  volumeName: movies-pv
