apiVersion: apps/v1
kind: Deployment
metadata:
  name: seerr
  namespace: jellyfin
  labels:
    app: seerr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seerr
  template:
    metadata:
      labels:
        app: seerr
    spec:
      containers:
        - name: seerr
          image: seerr/seerr:sha-c23117e
          ports:
            - containerPort: 5055
          volumeMounts:
            - name: data
              mountPath: /app/config
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: seerr-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: seerr
  namespace: jellyfin
spec:
  selector:
    app: seerr
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 5055
