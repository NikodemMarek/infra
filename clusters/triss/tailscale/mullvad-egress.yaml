apiVersion: v1
kind: ServiceAccount
metadata:
  name: mullvad-egress
  namespace: tailscale
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mullvad-egress
  namespace: tailscale
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["mullvad-egress-state"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mullvad-egress
  namespace: tailscale
subjects:
  - kind: ServiceAccount
    name: mullvad-egress
    namespace: tailscale
roleRef:
  kind: Role
  name: mullvad-egress
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mullvad-egress
  namespace: tailscale
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mullvad-egress
  template:
    metadata:
      labels:
        app: mullvad-egress
    spec:
      serviceAccountName: mullvad-egress
      containers:
        - name: tailscale
          image: tailscale/tailscale:v1.92.5
          env:
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: mullvad-egress-auth
                  key: authkey
            - name: TS_HOSTNAME
              value: mullvad-egress
            - name: TS_USERSPACE
              value: "true"
            # First deploy with this empty so the pod can register before Mullvad is enabled.
            # Then set to: "--exit-node=bg-sof-wg-001.mullvad.ts.net --exit-node-allow-lan-access=false"
            - name: TS_EXTRA_ARGS
              value: ""
            - name: TS_SOCKS5_SERVER
              value: ":1055"
            - name: TS_OUTBOUND_HTTP_PROXY_LISTEN
              value: ":1055"
            - name: TS_KUBE_SECRET
              value: "mullvad-egress-state"
          ports:
            - name: proxy
              containerPort: 1055
          readinessProbe:
            tcpSocket:
              port: 1055
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "300m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: mullvad-egress
  namespace: tailscale
spec:
  selector:
    app: mullvad-egress
  ports:
    - name: proxy
      port: 1055
      targetPort: 1055
