apiVersion: apps/v1
kind: Deployment
metadata:
  name: mullvad-egress
  namespace: tailscale
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mullvad-egress
  template:
    metadata:
      labels:
        app: mullvad-egress
    spec:
      containers:
        - name: tailscale
          image: tailscale/tailscale:v1.92.5
          env:
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: mullvad-egress-auth
                  key: authkey
            - name: TS_HOSTNAME
              value: mullvad-egress
            - name: TS_USERSPACE
              value: "true"
            - name: TS_EXTRA_ARGS
              value: "--exit-node=<MULLVAD_EXIT_NODE> --exit-node-allow-lan-access=false"
            - name: TS_SOCKS5_SERVER
              value: ":1055"
            - name: TS_OUTBOUND_HTTP_PROXY_LISTEN
              value: ":1055"
            - name: TS_KUBE_SECRET
              value: ""
          ports:
            - name: proxy
              containerPort: 1055
          readinessProbe:
            tcpSocket:
              port: 1055
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "300m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: mullvad-egress
  namespace: tailscale
spec:
  selector:
    app: mullvad-egress
  ports:
    - name: proxy
      port: 1055
      targetPort: 1055
