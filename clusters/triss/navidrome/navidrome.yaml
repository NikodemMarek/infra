apiVersion: apps/v1
kind: Deployment
metadata:
  name: navidrome
  namespace: default
  labels:
    app: navidrome
spec:
  replicas: 0
  selector:
    matchLabels:
      app: navidrome
  template:
    metadata:
      labels:
        app: navidrome
    spec:
      initContainers:
        - name: get-plugins
          image: busybox:latest
          command:
            - /bin/sh
            - -c
            - |
              mkdir -p /data/plugins
              wget -O /data/plugins/audiomuseai.ndp https://github.com/NeptuneHub/AudioMuse-AI-NV-plugin/releases/download/v6/audiomuseai.ndp
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: navidrome
          image: deluan/navidrome:latest
          ports:
            - containerPort: 4533
          env:
            - name: ND_ENABLEINSIGHTSCOLLECTOR
              value: "false"
            - name: ND_LOGLEVEL
              value: "info"
            - name: ND_MUSICFOLDER
              value: "/music"
            - name: ND_DATAFOLDER
              value: "/data"
            - name: ND_PLUGINS_ENABLED
              value: "true"
            - name: ND_PLUGINS_AUTORELOAD
              value: "true"
            - name: ND_AGENTS
              value: "audiomuseai,lastfm,spotify,deezer"
            - name: ND_DEVARTISTINFOTIMETOLIVE
              value: "1s"
          volumeMounts:
            - name: data
              mountPath: /data
            - name: music
              mountPath: /music
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: navidrome-data-pvc
        - name: music
          persistentVolumeClaim:
            claimName: music-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: navidrome
  namespace: default
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/hostname: "navidrome"
spec:
  selector:
    app: navidrome
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 4533
