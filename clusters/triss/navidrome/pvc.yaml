apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: navidrome-data-pvc
  namespace: default
  labels:
    recurring-job-group.longhorn.io/default: "enabled"
  annotations:
    longhorn.io/volume-restore-from-backup: "navidrome-6cfdb486d6-wvddl"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi
