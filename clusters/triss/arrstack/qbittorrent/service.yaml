apiVersion: v1
kind: Service
metadata:
  name: qbittorrent
  namespace: arrstack
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/hostname: "qbittorrent"
    tailscale.com/proxy-class: "triss-pinned"
spec:
  selector:
    app: qbittorrent
  ports:
    - name: webui
      protocol: TCP
      port: 80
      targetPort: 8080
