apiVersion: apps/v1
kind: Deployment
metadata:
  name: prowlarr
  namespace: arrstack
  labels:
    app: prowlarr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: prowlarr
  template:
    metadata:
      labels:
        app: prowlarr
    spec:
      nodeSelector:
        kubernetes.io/hostname: triss
      containers:
        - name: prowlarr
          image: linuxserver/prowlarr:latest
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
          ports:
            - name: webui
              containerPort: 9696
          volumeMounts:
            - name: config
              mountPath: /config
              subPath: prowlarr
          resources:
            requests:
              cpu: "50m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: config-pvc
