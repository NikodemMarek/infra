apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: ollama-operator-repo
  namespace: flux-system
spec:
  interval: 30m
  url: https://github.com/nekomeowww/ollama-operator
  ref:
    tag: v0.10.10
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ollama-operator
  namespace: flux-system
spec:
  interval: 1h
  prune: true
  sourceRef:
    kind: GitRepository
    name: ollama-operator-repo
  path: "./dist"
  targetNamespace: ollama-system
  wait: true
